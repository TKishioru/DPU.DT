<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >

    <title>A-Frame Walkable Scene</title>

    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
  </head>

  <body
    style="
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef4ff, #f8fafc);
      display: flex;
      gap: 24px;
      overflow-x: hidden;
    "
  >

    <div
      style="
        width: 65%;
        height: calc(100vh - 48px);
        border-radius: 20px;
        overflow: hidden;
        background-color: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
      "
    >
      <a-scene
        embedded
        style="
          width: 100%;
          height: 100%;
        "
      >
        <a-sky color="#ECECEC"></a-sky>

        <a-plane
          position="0 0 -4"
          rotation="-90 0 0"
          width="40"
          height="40"
          color="#7BC8A4"
        ></a-plane>

        <a-box
          position="-1 0.5 -3"
          rotation="0 45 0"
          color="#4CC3D9"
        ></a-box>

        <a-sphere
          position="0 1.25 -5"
          radius="1.25"
          color="#EF2D5E"
        ></a-sphere>

        <a-cylinder
          position="1 0.75 -3"
          radius="0.5"
          height="1.5"
          color="#FFC65D"
        ></a-cylinder>

        <a-entity
          camera
          look-controls
          wasd-controls
          position="0 0.75 5"
        >
          <a-cursor color="black"></a-cursor>
        </a-entity>
      </a-scene>
    </div>

    <div
      style="
        width: 35%;
        height: calc(100vh - 48px);
        box-sizing: border-box;
        padding: 28px;
        border-radius: 20px;
        background-color: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
      "
    >
      <h1
        style="
          margin: 0 0 8px;
          font-size: 26px;
          color: #172554;
          text-align: center;
        "
      >
        Pose Controller
      </h1>

      <p
        style="
          margin: 0 0 24px;
          color: #64748b;
          text-align: center;
          line-height: 1.5;
        "
      >
        ใช้ท่าทางเพื่อควบคุมการเคลื่อนที่ในฉาก
      </p>

      <button
        type="button"
        onclick="init()"
        style="
          width: 100%;
          max-width: 280px;
          padding: 13px 24px;
          margin-bottom: 24px;
          border: none;
          border-radius: 12px;
          background: linear-gradient(135deg, #2563eb, #1d4ed8);
          color: #ffffff;
          font-size: 16px;
          font-weight: 700;
          cursor: pointer;
          box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        "
      >
        Start Camera
      </button>

      <div
        style="
          width: 100%;
          max-width: 280px;
          padding: 10px;
          box-sizing: border-box;
          border-radius: 16px;
          background-color: #0f172a;
          box-shadow: 0 6px 18px rgba(15, 23, 42, 0.22);
        "
      >
        <canvas
          id="canvas"
          style="
            display: block;
            width: 100%;
            height: auto;
            border-radius: 10px;
            background-color: #000000;
          "
        ></canvas>
      </div>

      <div
        id="label-container"
        style="
          width: 100%;
          max-width: 280px;
          margin-top: 20px;
          display: grid;
          gap: 10px;
          color: #1e293b;
          font-size: 15px;
          font-weight: 600;
          line-height: 1.6;
        "
      ></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>

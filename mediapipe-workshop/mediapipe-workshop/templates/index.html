<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ติดตามมือ</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-main: #f4f7fb;
        --card-bg: #ffffff;
        --text-main: #111827;
        --text-muted: #6b7280;
        --primary: #2563eb;
        --primary-soft: #dbeafe;
        --success: #16a34a;
        --success-soft: #dcfce7;
        --border-soft: #e5e7eb;
        --shadow-soft: 0 20px 45px rgba(15, 23, 42, 0.08);
        --radius-lg: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(22, 163, 74, 0.12), transparent 28%),
          var(--bg-main);
        color: var(--text-main);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app-shell {
        max-width: 1180px;
      }

      .hero-card {
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow-soft);
      }

      .hero-icon {
        width: 54px;
        height: 54px;
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--primary), #38bdf8);
        color: white;
        font-size: 1.6rem;
        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.28);
      }

      .video-card {
        overflow: hidden;
        border: 1px solid rgba(229, 231, 235, 0.9);
        border-radius: 28px;
        background: var(--card-bg);
        box-shadow: var(--shadow-soft);
      }

      .canvas-frame {
        position: relative;
        padding: 14px;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(22, 163, 74, 0.1)),
          #ffffff;
      }

      .canvas-inner {
        position: relative;
        overflow: hidden;
        border-radius: 22px;
        background: #0f172a;
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      #canvas {
        display: block;
        width: 100%;
        height: auto;
        min-height: 320px;
        object-fit: cover;
      }

      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 12px;
        color: #ffffff;
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(8px);
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }

      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.22);
      }

      .badge-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: calc(100% - 32px);
      }

      .badge-container .badge {
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 600;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
      }

      .loading-overlay {
        display: none;
        z-index: 10;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        border-radius: 22px;
      }

      .loading-overlay.is-visible {
        display: flex;
      }

      .loading-panel {
        padding: 22px 26px;
        border-radius: 22px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        border: 1px solid var(--border-soft);
      }

      #retryButton {
        pointer-events: auto;
        border-radius: 999px;
        padding-inline: 18px;
        font-weight: 700;
      }

      .stat-card {
        height: 100%;
        border: 1px solid rgba(229, 231, 235, 0.9);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .stat-card:hover {
        transform: translateY(-3px);
        border-color: rgba(37, 99, 235, 0.28);
        box-shadow: 0 18px 34px rgba(15, 23, 42, 0.1);
      }

      .stat-label {
        color: var(--text-muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .stat-value {
        margin-top: 8px;
        font-size: clamp(1.7rem, 4vw, 2.35rem);
        font-weight: 800;
        line-height: 1;
      }

      .stat-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 14px;
        margin-bottom: 12px;
        background: var(--primary-soft);
        color: var(--primary);
        font-weight: 800;
      }

      .status-card {
        border: 1px solid rgba(229, 231, 235, 0.9);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06);
      }

      .debug-box {
        max-height: 180px;
        overflow: auto;
        border-radius: 16px;
        padding: 14px 16px;
        background: #0f172a;
        color: #d1fae5;
        border: 1px solid rgba(15, 23, 42, 0.08);
        white-space: pre-wrap;
      }

      @media (max-width: 576px) {
        .container {
          padding-left: 16px;
          padding-right: 16px;
        }

        .canvas-frame {
          padding: 10px;
        }

        #canvas {
          min-height: 260px;
        }

        .hero-card {
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <main class="container app-shell py-4 py-md-5">
      <section class="hero-card p-4 p-md-5 mb-4">
        <div class="d-flex flex-column flex-md-row align-items-center gap-3 text-center text-md-start">
          <div class="hero-icon">✋</div>
          <div>
            <h1 class="display-6 fw-bold mb-1">ติดตามมือ</h1>
            <p class="text-muted mb-0">
              ตรวจจับจุดมือแบบเรียลไทม์ พร้อมแสดงจำนวนมือและสถานะของแต่ละข้าง
            </p>
          </div>
        </div>
      </section>

      <section class="row justify-content-center">
        <div class="col-lg-9">
          <div class="video-card">
            <div class="card-body canvas-frame">
              <div class="canvas-inner">
                <video
                  id="video"
                  autoplay
                  muted
                  playsinline
                  class="d-none"
                ></video>

                <canvas
                  id="canvas"
                  width="640"
                  height="480"
                ></canvas>

                <div class="position-absolute top-0 start-0 m-3">
                  <span class="live-badge">
                    <span class="live-dot"></span>
                    สด
                  </span>
                </div>

                <div
                  class="badge-container position-absolute top-0 start-0 m-3"
                  style="margin-top: 58px !important;"
                  id="badgeContainer"
                ></div>

                <div
                  class="position-absolute top-0 start-0 w-100 h-100 flex-column align-items-center justify-content-center loading-overlay"
                  id="loadingOverlay"
                >
                  <div class="loading-panel text-center">
                    <div class="spinner-border text-success" role="status"></div>
                    <div id="loadingText" class="mt-3 fw-semibold">
                      กำลังโหลดโมเดล...
                    </div>
                    <button
                      id="retryButton"
                      class="btn btn-success btn-sm mt-3 d-none"
                    >
                      ลองเปิดกล้องอีกครั้ง
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="row g-3 justify-content-center mt-4">
        <div class="col-md-4 col-lg-3">
          <div class="stat-card">
            <div class="card-body text-center p-4">
              <div class="stat-chip">#</div>
              <div class="stat-label">มือที่ตรวจพบ</div>
              <div class="stat-value" id="handCount">0</div>
            </div>
          </div>
        </div>

        <div class="col-md-4 col-lg-3">
          <div class="stat-card">
            <div class="card-body text-center p-4">
              <div class="stat-chip">L</div>
              <div class="stat-label">มือซ้าย</div>
              <div class="stat-value" id="leftGesture">—</div>
            </div>
          </div>
        </div>

        <div class="col-md-4 col-lg-3">
          <div class="stat-card">
            <div class="card-body text-center p-4">
              <div class="stat-chip">R</div>
              <div class="stat-label">มือขวา</div>
              <div class="stat-value" id="rightGesture">—</div>
            </div>
          </div>
        </div>
      </section>

      <section class="row justify-content-center mt-4">
        <div class="col-lg-9">
          <div class="status-card">
            <div class="card-body p-4">
              <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                <div>
                  <div class="fw-bold">ดีบัก</div>
                  <div class="text-muted small">ผลลัพธ์และสถานะการตรวจจับ</div>
                </div>
                <span class="badge rounded-pill text-bg-light border">LOG</span>
              </div>

              <pre id="debugLog" class="debug-box mb-0 small">รอผลตรวจจับ...</pre>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/static/script.js"></script>
  </body>
</html>
